name: Boss
description: "a Minecraft custom boss mob creation and management plugin for Spigot/Paper"
repo: kangarko/Boss-Src

layout:
  type: single-module
  source_root: src/main/java/
  resources_root: src/main/resources/
  package: org.mineacademy.boss

writable_prefixes:
  - src/main/

key_files:
  - src/main/resources/settings.yml

# Default resource files that ship with the plugin. Listed in the system prompt so
# the bot verifies whether a requested feature already exists before refusing.
# Globs are evaluated relative to the plugin source root (MAIN_DIR at runtime).
default_resources_globs:
  - src/main/resources/lang/*.json

# Java packages containing commands/subcommands.
command_dirs:
  - src/main/java/org/mineacademy/boss/command

purchase_links:
  main:
    name: "Boss"
    url: "https://builtbybit.com/resources/boss.21619/"

extra_rules: |
  - Never change pronouns (his, himself, etc.) in code, messages, or lang files. Keep original gendered language as-is
  - Boss config files for individual bosses are stored in the server's Boss/bosses/ folder at runtime, NOT in the source resources directory
  - Each boss is a YAML file with sections: Type, Alias, Health, Attributes, Equipment, Drops, Skills, Commands
  - The 17 built-in skills are: Arrow, Bomb, Confuse, Disarm, Enderman, Ignite, Fireball, Freeze, Lightning, Minions, Potions, StealLife, Teleport, Throw, Commands, Commands_Nearby, Commands_Target
  - The 5 spawn rule types are: LOCATION_PERIOD, RESPAWN_AFTER_DEATH, REGION_ENTER, PERIOD, REPLACE_VANILLA
  - Boss supports Citizens NPC integration and ModelEngine custom models
  - Boss 6.0.0+ unified AI under one menu: Settings → AI & Behavior. The legacy `Native_Attack_Goal_Enabled` flag and the `Citizens.Goal_Target_Aggressive` flag are gone. Both are migrated automatically on first load.
  - To make any mob (including passive) hostile, the admin sets in the boss YAML under Citizens: `Goal_Target_Enabled: true`, `Goal_Target_Follow: true`, `Goal_Target_Attack: true`, `Goal_Target_Radius: 16`, `Goal_Target_Entities: [PLAYER]`. Follow and Attack are independent toggles: Follow without Attack means trail without striking; Attack without Follow means strike on contact without pursuit.
  - Routing: PLAYER bosses always go through Citizens (skins, traits). Non-PLAYER bosses on Paper 1.15+ always go through the native Paper Goal API. On Paper < 1.15 non-PLAYER bosses use Citizens iff `Citizens.Enabled: true` is set in the boss YAML.
  - The native Goal API availability is checked via GoalManagerCheck (verifies com.destroystokyo.paper.entity.ai.Goal class and Bukkit.getMobGoals() method exist).

docs_url: "https://docs.mineacademy.org/boss/"

known_dependencies:
  Citizens: CitizensDev/CitizensAPI
  WorldGuard: EngineHub/WorldGuard
  WorldEdit: EngineHub/WorldEdit
  GriefPrevention: GriefPrevention/GriefPrevention
  Lands: IncrediblePlugins/LandsAPI
  RoseStacker: Rosewood-Development/RoseStacker
  Vault: MilkBowl/VaultAPI
  PlaceholderAPI: PlaceholderAPI/PlaceholderAPI
  packetevents: retrooper/packetevents
  Towny: TownyAdvanced/Towny
  DiscordSRV: DiscordSRV/DiscordSRV
  LuckPerms: LuckPerms/LuckPerms
  AuthMe: AuthMe/AuthMeReloaded
  Essentials: EssentialsX/Essentials
  Factions: MassiveCraft/Factions
